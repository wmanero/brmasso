services:
  postgres:
    image: postgres:16-alpine
    container_name: br-massoterapia-postgres
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-br_massoterapia}
      POSTGRES_USER: ${POSTGRES_USER:-brmasso}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  backend:
    build:
      context: ../backend
    container_name: br-massoterapia-backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-brmasso}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-br_massoterapia}
      FRONTEND_URL: https://${APP_DOMAIN}
    depends_on:
      - postgres
    networks:
      - internal

  frontend:
    build:
      context: ../frontend
    container_name: br-massoterapia-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: /api/v1
    depends_on:
      - backend
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: br-massoterapia-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    networks:
      - internal

  certbot:
    image: certbot/certbot:latest
    container_name: br-massoterapia-certbot
    profiles: ["certbot"]
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt

volumes:
  postgres_data:
  letsencrypt:
  certbot_www:

networks:
  internal:
