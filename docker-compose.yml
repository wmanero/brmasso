services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: br_massoterapia
      POSTGRES_USER: brmasso
      POSTGRES_PASSWORD: brmasso123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://brmasso:brmasso123@postgres:5432/br_massoterapia
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    ports:
      - "4173:4173"

volumes:
  postgres_data:
